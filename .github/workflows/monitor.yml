name: Job Monitor

on:
  schedule:
    - cron: '0 * * * *'   # Runs every hour at :00
  workflow_dispatch:        # Lets you run it manually from GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Needed to commit snapshots.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Job Monitor
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python monitor.py

      - name: Commit updated snapshots
        run: |
          git config user.name "Job Monitor Bot"
          git config user.email "jobmonitor@bot.com"
          git add snapshots.json monitor_log.txt
          git diff --staged --quiet || git commit -m "chore: update snapshots [skip ci]"
          git push
