name: Job Monitor

on:
  push:
    paths:
      - 'companies.json'
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python (with caching)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      # 🔁 Retry logic (3 attempts)
      - name: Run Job Monitor (with retry)
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          for i in 1 2 3; do
            python monitor.py && exit 0
            echo "Retry $i failed..."
            sleep 5
          done
          exit 1

      - name: Commit updated snapshots
        run: |
          git config user.name "Job Monitor Bot"
          git config user.email "bot@example.com"
          git add snapshots.json monitor_log.txt
          git diff --staged --quiet || git commit -m "chore: update snapshots [skip ci]"
          git pull --rebase origin master
          git push

      # 🔔 Notify on failure (Telegram)
      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TG_CHAT_ID }} \
          -d text="❌ Job Monitor failed on GitHub Actions"
